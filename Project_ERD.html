
<style>
#erd-wrap { padding: 16px 0; }
#erd svg { width: 100% !important; height: auto !important; }
</style>
<div id="erd-wrap"><div id="erd"></div></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a3a' : '#f0effe',
    primaryBorderColor: dark ? '#534AB7' : '#7F77DD',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    secondaryColor: dark ? '#1a2a2a' : '#e1f5ee',
    secondaryBorderColor: dark ? '#0F6E56' : '#1D9E75',
    tertiaryColor: dark ? '#2a1a1a' : '#faece7',
    tertiaryBorderColor: dark ? '#993C1D' : '#D85A30',
  },
});

const diagram = `erDiagram
  Countries {
    INT CountryID PK
    VARCHAR CountryName
    VARCHAR Region
    FLOAT Probability
  }
  ShipmentStatusLookup {
    INT StatusID PK
    VARCHAR StatusName
  }
  FailureReasonLookup {
    INT ReasonID PK
    VARCHAR FailureReason
  }
  MaterialLookup {
    INT MaterialID PK
    VARCHAR MaterialName
  }
  Hubs {
    INT HubID PK
    VARCHAR HubName
    VARCHAR City
    INT CountryID FK
  }
  Customers {
    INT CustomerID PK
    VARCHAR Name
    VARCHAR Address
    VARCHAR ContactInfo
    INT CountryID FK
    VARCHAR CustomerType
  }
  Employees {
    INT EmployeeID PK
    VARCHAR Name
    INT HubID FK
    VARCHAR Role
  }
  Couriers {
    INT CourierID PK
    VARCHAR CourierName
    INT HubID FK
    VARCHAR CompanyName
  }
  Shipments {
    INT ShipmentID PK
    VARCHAR TrackingNumber
    INT SenderID FK
    INT ReceiverID FK
    INT OriginHubID FK
    INT DestinationHubID FK
    DATETIME CreatedDate
    DATETIME PromisedDeliveryDate
    DATETIME DeliveredDate
    VARCHAR ServiceType
    DECIMAL PackageWeight_KG
    DECIMAL PackageVolume_CM3
    DECIMAL DeclaredValue
    DECIMAL ShippingFee
    INT StatusID FK
    INT MaterialID FK
    INT FinalFailureReasonID FK
  }
  Payments {
    INT PaymentID PK
    INT ShipmentID FK
    DECIMAL Amount
    DATETIME PaymentDate
    VARCHAR PaymentMethod
  }
  TrackingEvents {
    INT EventID PK
    INT ShipmentID FK
    DATETIME EventTime
    INT HubID FK
    VARCHAR Status
    VARCHAR EventDescription
  }
  DeliveryAttempts {
    INT AttemptID PK
    INT ShipmentID FK
    INT CourierID FK
    DATETIME AttemptTime
    BIT IsSuccessful
    INT FailureReasonID FK
  }
  ProofOfDelivery {
    INT PODID PK
    INT ShipmentID FK
    VARCHAR PODType
    DATETIME LoggedTime
  }

  Countries ||--o{ Hubs : "located in"
  Countries ||--o{ Customers : "based in"
  Hubs ||--o{ Employees : "works at"
  Hubs ||--o{ Couriers : "assigned to"
  Hubs ||--o{ TrackingEvents : "occurs at"
  Customers ||--o{ Shipments : "sends"
  Customers ||--o{ Shipments : "receives"
  Hubs ||--o{ Shipments : "origin"
  Hubs ||--o{ Shipments : "destination"
  ShipmentStatusLookup ||--o{ Shipments : "status"
  MaterialLookup ||--o{ Shipments : "material"
  FailureReasonLookup ||--o{ Shipments : "final failure"
  FailureReasonLookup ||--o{ DeliveryAttempts : "attempt failure"
  Shipments ||--o{ Payments : "paid via"
  Shipments ||--o{ TrackingEvents : "tracked by"
  Shipments ||--o{ DeliveryAttempts : "attempted"
  Shipments ||--o{ ProofOfDelivery : "proven by"
  Couriers ||--o{ DeliveryAttempts : "performs"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
